services:
  - type: web
    name: agentic-career-companion
    runtime: python
    rootDir: career_companion
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: WX_API_KEY
        sync: false
      - key: WX_PROJECT_ID
        sync: false
      - key: WX_URL
        value: https://us-south.ml.cloud.ibm.com
      - key: FLASK_SECRET_KEY
        value: career_companion_secret_2024
      - key: FLASK_ENV
        value: production
